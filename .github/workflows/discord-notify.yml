name: Beomz Studio CI — Discord

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_STUDIO }}
          status: success
          title: "Beomz Studio — merged to main"
          description: "${{ github.event.head_commit.message }}"
          username: "Beomz Studio CI"
          color: 0xF97316
